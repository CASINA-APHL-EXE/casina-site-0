<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VISUAL — CASINA</title>

<style>
:root{
  --c: rgba(0,255,255,.85);
  --bg:#000;

  --fs-1: clamp(12px,1.05vw,16px);
  --fs-2: clamp(16px,1.45vw,22px);
  --ls-1: clamp(1px,.25vw,4px);

  --pad: clamp(14px,2vw,24px);
  --radius:8px;
  --shadow: 0 0 40px rgba(0,255,255,.08);
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  background:var(--bg);
  color:var(--c);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}

/* page transition */
html.is-transitioning body{
  opacity:0;
  filter: blur(10px);
  transform: translateY(6px);
  transition:.5s ease;
}

body.is-entering{
  opacity:0;
  filter: blur(10px);
  transform: translateY(6px);
}

body{ transition:.5s ease }

/* top bar */

.shell{
  padding:
    calc(var(--pad) + env(safe-area-inset-top))
    calc(var(--pad) + env(safe-area-inset-right))
    calc(var(--pad) + env(safe-area-inset-bottom))
    calc(var(--pad) + env(safe-area-inset-left));
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom: clamp(14px,2vw,18px);
}

.h1{
  font-size:var(--fs-2);
  letter-spacing:var(--ls-1);
}

.home{
  text-decoration:none;
  color:var(--c);
  border:1px solid rgba(0,255,255,.25);
  background:rgba(0,255,255,.05);
  padding:10px 14px;
  border-radius:18px;
  font-size:var(--fs-1);
}

/* GRID */

.grid{
  display:grid;
  gap: clamp(14px,2vw,18px);
  grid-template-columns: repeat(4, minmax(0,1fr));
}

@media (max-width:1100px){
  .grid{ grid-template-columns: repeat(3,1fr); }
}

@media (max-width:820px){
  .grid{ grid-template-columns: repeat(2,1fr); }
}

@media (max-width:720px){
  .grid{
    grid-template-columns:1fr;
    gap:18px;
  }
}

/* Card */

.card{
  border:1px solid rgba(0,255,255,.18);
  border-radius:16px;
  overflow:hidden;
  background: rgba(0,255,255,.03);
  box-shadow: var(--shadow);
  display:flex;
  flex-direction:column;
  cursor:pointer;
}

/* video */

.videoBox{
  aspect-ratio:9/16;
  background:#000;
  position:relative;
}

.videoBox video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* hide video temporarily to show poster */

.videoBox video.hide{
  opacity:0;
}

/* footer */

.footer{
  padding:14px;
}

.name{
  font-size:var(--fs-1);
  margin-bottom:6px;
}

.desc1,.desc2{
  font-size:var(--fs-1);
  opacity:.65;
}

/* fullscreen player */

#fsVideo{
  position:fixed;
  left:-9999px;
  top:-9999px;
  width:320px;
  height:180px;
}

#fsVideo:fullscreen,
#fsVideo:-webkit-full-screen{
  left:0;
  top:0;
  width:100vw;
  height:100vh;
}

@media (max-width:720px){

.card{ scroll-snap-align:start }

.grid{
  scroll-snap-type:y mandatory;
  overflow-y:auto;
  max-height:calc(100svh - 120px);
}

}
</style>
</head>

<body>

<div class="shell">

<div class="top">
<div class="h1">VISUAL ARCHIVE</div>
<a class="home" href="/">HOME</a>
</div>

<section class="grid">

<!-- ARTIFACT 01 -->

<article class="card" data-src="../assets/videos/artifact01.mp4">
<div class="videoBox">
<video poster="../assets/covers/artifact01.png"
muted playsinline loop preload="metadata"></video>
</div>
<div class="footer">
<p class="name">ARTIFACT 01</p>
<p class="desc1">visualization · touchdesigner</p>
<p class="desc2">music by kuko</p>
</div>
</article>

<!-- ARTIFACT 02 -->

<article class="card" data-src="">
<div class="videoBox">
<video muted playsinline loop preload="metadata"></video>
</div>
<div class="footer">
<p class="name">ARTIFACT 02</p>
<p class="desc1">placeholder</p>
<p class="desc2">coming soon</p>
</div>
</article>

<!-- ARTIFACT 03 -->

<article class="card" data-src="">
<div class="videoBox">
<video muted playsinline loop preload="metadata"></video>
</div>
<div class="footer">
<p class="name">ARTIFACT 03</p>
<p class="desc1">placeholder</p>
<p class="desc2">coming soon</p>
</div>
</article>

<!-- ARTIFACT 04 -->

<article class="card" data-src="../assets/videos/artifact04.mp4">
<div class="videoBox">
<video poster="../assets/covers/artifact04.png"
muted playsinline loop preload="metadata"></video>
</div>
<div class="footer">
<p class="name">ARTIFACT 04</p>
<p class="desc1">visualization · touchdesigner</p>
<p class="desc2">music by memento mori</p>
</div>
</article>

</section>
</div>

<video id="fsVideo" controls preload="metadata"></video>

<script>

const cards=[...document.querySelectorAll(".card")]
const fsVideo=document.getElementById("fsVideo")

function pausePreviews(except=null){
cards.forEach(c=>{
if(except && c===except) return
const v=c.querySelector("video")
if(v) v.pause()
})
}

function showPoster(v){

v.pause()

v.classList.add("hide")

requestAnimationFrame(()=>{
requestAnimationFrame(()=>{
v.classList.remove("hide")
})
})

}

async function openFullscreen(card){

const src=card.dataset.src
if(!src) return

pausePreviews()

fsVideo.src=src
fsVideo.currentTime=0
fsVideo.muted=false

if(fsVideo.requestFullscreen){

await fsVideo.requestFullscreen()
await fsVideo.play()
return

}

await fsVideo.play()

if(fsVideo.webkitEnterFullscreen){
fsVideo.webkitEnterFullscreen()
}

}

cards.forEach(card=>{

const src=card.dataset.src
const v=card.querySelector("video")

if(src && v){

v.src=src
v.muted=true
v.loop=true
v.playsInline=true

}

card.addEventListener("mouseenter",()=>{

if(!window.matchMedia("(hover:hover)").matches) return
if(!v) return

v.play().catch(()=>{})

})

card.addEventListener("mouseleave",()=>{

if(!window.matchMedia("(hover:hover)").matches) return
if(!v) return

showPoster(v)

})

card.addEventListener("click",()=>openFullscreen(card))

})

</script>

</body>
</html>
