<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VISUAL — CASINA</title>

<style>
:root{
  --c: rgba(0,255,255,.85);
  --bg:#000;

  --fs-1: clamp(12px,1.05vw,16px);
  --fs-2: clamp(16px,1.45vw,22px);
  --ls-1: clamp(1px,.25vw,4px);

  --pad: clamp(14px,2vw,24px);
  --radius:8px;
  --stroke:rgba(0,255,255,.20);
  --panel:rgba(0,255,255,.05);
}

*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--c);font-family:monospace}
body{
  min-height:100svh;
  opacity:1;
  transition:opacity .6s ease,filter .6s ease;
  overflow-x:hidden;
}
body.is-entering{opacity:0;filter:blur(2px)}
html.is-transitioning body{opacity:0;filter:blur(2px)}

.safe{
  padding:
    calc(var(--pad) + env(safe-area-inset-top))
    calc(var(--pad) + env(safe-area-inset-right))
    calc(var(--pad) + env(safe-area-inset-bottom))
    calc(var(--pad) + env(safe-area-inset-left));
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
  gap:10px;
}
.title{
  font-size:var(--fs-2);
  letter-spacing:var(--ls-1);
  opacity:.85;
}
.btn{
  text-decoration:none;
  color:var(--c);
  border:1px solid rgba(0,255,255,.25);
  background:rgba(0,255,255,.04);
  padding:10px 14px;
  border-radius:14px;
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  opacity:.8;
  white-space:nowrap;
}
.btn:hover{opacity:1}

/* GRID */
.grid{
  margin-top:30px;
  display:grid;
  gap:18px;
  grid-template-columns:repeat(4,1fr);
}
@media (max-width:1200px){ .grid{grid-template-columns:repeat(3,1fr)} }
@media (max-width:900px){ .grid{grid-template-columns:repeat(2,1fr)} }

@media (max-width:720px){
  .grid{
    grid-template-columns:1fr;
    max-height:calc(100svh - 90px);
    overflow-y:auto;
    scroll-snap-type:y mandatory;
  }
  .card{
    scroll-snap-align:start;
    min-height:calc(100svh - 110px);
  }
}

/* CARD (now: video area + footer, no overlay covering video) */
.card{
  border:1px solid var(--stroke);
  background:var(--panel);
  border-radius:var(--radius);
  clip-path:polygon(0 0,100% 0,100% 95%,95% 100%,0 100%);
  overflow:hidden;
  opacity:.92;
  transition:.2s;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 0 26px rgba(0,255,255,.10);
  opacity:1;
}

.videoBox{
  position:relative;
  /* make the window visually taller */
  aspect-ratio: 9/16;
  background:#000;
  overflow:hidden;
}
@media (max-width:720px){
  .videoBox{
    /* for mobile feed: give more height */
    height: calc(100svh - 190px);
    aspect-ratio:auto;
  }
}

.videoBox video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  opacity:.92;
  transform:scale(1.02);
  transition:.2s;
}

.card:hover .videoBox video{
  opacity:1;
  transform:scale(1.05);
}

.cardFooter{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:12px;
  padding:12px 12px;
  border-top:1px solid rgba(0,255,255,.12);
  background:rgba(0,0,0,.18);
}

.txt{
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:0;
}
.name{
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.desc{
  font-size:var(--fs-1);
  opacity:.5;
  letter-spacing:var(--ls-1);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.badge{
  border:1px solid rgba(0,255,255,.22);
  background:rgba(0,0,0,.35);
  padding:6px 10px;
  border-radius:999px;
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  cursor:pointer;
  user-select:none;
  opacity:.9;
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:42px;
}
.badge:hover{opacity:1}

/* FULLSCREEN PLAYER */
.fsVideo{
  position:fixed;
  left:-9999px;
  top:-9999px;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
}

</style>
</head>

<body>
<div class="safe">
  <div class="topbar">
    <div class="title">VISUAL MODULE</div>
    <a class="btn" href="/">HOME</a>
  </div>

  <section class="grid" id="grid">
    <article class="card" data-title="ARTIFACT 01" data-src="/assets/videos/artifact01.mp4">
      <div class="videoBox">
        <video muted loop playsinline preload="metadata"></video>
      </div>
      <div class="cardFooter">
        <div class="txt">
          <div class="name">ARTIFACT 01</div>
          <div class="desc">720×1280 · AE fragment</div>
        </div>
        <div class="badge" data-open aria-label="Open fullscreen">⤢</div>
        <!-- If you prefer text: replace ⤢ with VIDEO -->
      </div>
    </article>

    <!-- duplicate <article class="card"...> for more artifacts -->
  </section>
</div>

<video id="fsVideo" class="fsVideo" controls preload="metadata"></video>

<script>
document.body.classList.add("is-entering");
requestAnimationFrame(()=>requestAnimationFrame(()=>document.body.classList.remove("is-entering")));
window.addEventListener("pageshow",()=>{
  document.documentElement.classList.remove("is-transitioning");
  document.body.classList.remove("is-entering");
});
document.querySelectorAll('a[href="/"]').forEach(a=>{
  a.addEventListener("click",(e)=>{
    e.preventDefault();
    document.documentElement.classList.add("is-transitioning");
    setTimeout(()=>location.href="/",500);
  });
});

const cards = [...document.querySelectorAll(".card")];
const fsVideo = document.getElementById("fsVideo");
function isMobile(){ return window.innerWidth < 720; }

function pausePreviews(except=null){
  cards.forEach(c=>{
    if(except && c===except) return;
    const v = c.querySelector(".videoBox video");
    if(v) v.pause();
  });
}

function cleanupFsVideo(){
  // stop & release to avoid holding memory / audio session
  fsVideo.pause();
  fsVideo.removeAttribute("src");
  fsVideo.load();
}

function openFullscreen(card){
  const src = card.dataset.src || "";
  if(!src) return;

  // stop any preview FIRST (prevents intermediate flash / double players)
  pausePreviews();

  fsVideo.pause();
  fsVideo.src = src;
  fsVideo.currentTime = 0;
  fsVideo.muted = false;

  // iOS + desktop policies: must be in the click gesture
  const tryEnter = ()=>{
    // Desktop / Android
    if(fsVideo.requestFullscreen){
      fsVideo.requestFullscreen().catch(()=>{});
      return;
    }
    // iOS Safari
    if(fsVideo.webkitEnterFullscreen){
      try{ fsVideo.webkitEnterFullscreen(); }catch(e){}
    }
  };

  // Start playback (may be required before fullscreen on some browsers)
  fsVideo.play().then(()=>tryEnter()).catch(()=>tryEnter());
}

// Exit handlers
document.addEventListener("fullscreenchange", ()=>{
  if(!document.fullscreenElement) cleanupFsVideo();
});
fsVideo.addEventListener("webkitendfullscreen", cleanupFsVideo);

cards.forEach(card=>{
  const src = card.dataset.src || "";
  const v = card.querySelector(".videoBox video");
  if(src && v){
    v.src = src;
    v.muted = true;
    v.loop = true;
    v.playsInline = true;
  }

  // desktop hover preview only
  card.addEventListener("mouseenter",()=>{
    if(!window.matchMedia("(hover:hover)").matches) return;
    if(!v) return;
    v.muted = true;
    v.play().catch(()=>{});
  });
  card.addEventListener("mouseleave",()=>{
    if(!window.matchMedia("(hover:hover)").matches) return;
    if(!v) return;
    v.pause();
  });

  // click card behavior:
  // mobile: tap anywhere opens fullscreen (shorts UX)
  // desktop: tap anywhere opens fullscreen too (cleaner, consistent)
  card.addEventListener("click",(e)=>{
    // if clicked the button, its handler will run; we still open fullscreen
    openFullscreen(card);
  });

  const openBtn = card.querySelector("[data-open]");
  if(openBtn){
    openBtn.addEventListener("click",(e)=>{
      e.stopPropagation();
      openFullscreen(card);
    });
  }
});

// mobile scroll: autoplay muted preview on most visible card
const observer = new IntersectionObserver(entries=>{
  if(!isMobile()) return;

  const visible = entries
    .filter(e=>e.isIntersecting)
    .sort((a,b)=> b.intersectionRatio - a.intersectionRatio);

  if(visible.length === 0) return;

  const card = visible[0].target;
  const v = card.querySelector(".videoBox video");
  if(!v) return;

  pausePreviews(card);
  v.muted = true;
  v.play().catch(()=>{});
}, { threshold:[0.6,0.8,0.9] });

cards.forEach(c=>observer.observe(c));
</script>
</body>
</html>
