<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VISUAL — CASINA</title>

<style>
:root{
  --c: rgba(0,255,255,.85);
  --bg: #000;

  --fs-1: clamp(12px,1.1vw,16px);
  --fs-2: clamp(16px,1.6vw,24px);
  --ls-1: clamp(1px,.25vw,4px);

  --pad: clamp(14px,2vw,24px);
  --radius: 20px;
}

*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--c);font-family:monospace}
body{min-height:100svh;min-height:100dvh;opacity:1;transition:opacity .6s ease,filter .6s ease}
body.is-entering{opacity:0;filter:blur(2px)}
html.is-transitioning body{opacity:0;filter:blur(2px)}

.safe{
  padding:
    calc(var(--pad) + env(safe-area-inset-top))
    calc(var(--pad) + env(safe-area-inset-right))
    calc(var(--pad) + env(safe-area-inset-bottom))
    calc(var(--pad) + env(safe-area-inset-left));
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
  gap:10px;
}

.title{
  font-size:var(--fs-2);
  letter-spacing:var(--ls-1);
  opacity:.85;
}

.btn{
  text-decoration:none;
  color:var(--c);
  border:1px solid rgba(0,255,255,.25);
  padding:10px 14px;
  border-radius:14px;
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  opacity:.8;
  white-space:nowrap;
}
.btn:hover{opacity:1}

.grid{
  margin-top:30px;
  display:grid;
  gap:18px;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
}

.card{
  aspect-ratio:16/10;
  border-radius:var(--radius);
  border:1px solid rgba(0,255,255,.2);
  background:rgba(0,255,255,.05);
  position:relative;
  overflow:hidden;
  cursor:pointer;

  display:flex;
  align-items:flex-end;
  justify-content:space-between;

  padding:12px 12px;
  opacity:.85;
  transition:.25s;
}
.card:hover{
  transform:translateY(-4px);
  opacity:1;
  box-shadow:0 0 30px rgba(0,255,255,.1);
}

.card video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  opacity:.78;
  filter:saturate(1.05) contrast(1.02);
  transform:scale(1.02);
  transition:opacity .25s ease, transform .25s ease;
  pointer-events:none;
}
.card:hover video{
  opacity:.98;
  transform:scale(1.04);
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.68), rgba(0,0,0,.12) 55%, rgba(0,0,0,0));
  pointer-events:none;
}

.meta{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.meta .name{
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  opacity:.95;
}
.meta .desc{
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  opacity:.55;
  line-height:1.35;
  max-width:40ch;
}
.badge{
  position:relative;
  z-index:2;
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  opacity:.55;
  border:1px solid rgba(0,255,255,.18);
  background:rgba(0,0,0,.25);
  padding:6px 10px;
  border-radius:999px;
}

/* ===== Viewer (fullscreen modal) ===== */
.viewer{
  position:fixed;
  inset:0;
  z-index:50;
  display:none;
  background:rgba(0,0,0,.86);
  backdrop-filter: blur(6px);
}
.viewer.open{display:block;}

.viewer .panel{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:min(1100px, 94vw);
  max-height: calc(100svh - 140px);
  border-radius:22px;
  border:1px solid rgba(0,255,255,.22);
  background:rgba(0,255,255,.05);
  overflow:hidden;
  box-shadow:0 0 60px rgba(0,255,255,.10);
}

.viewer .bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  background:rgba(0,0,0,.35);
  border-bottom:1px solid rgba(0,255,255,.14);
}

.viewer .vtitle{
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  opacity:.85;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.viewer .x{
  cursor:pointer;
  color:var(--c);
  border:1px solid rgba(0,255,255,.22);
  background:rgba(0,255,255,.06);
  padding:8px 10px;
  border-radius:14px;
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  opacity:.85;
  white-space:nowrap;
}
.viewer .x:hover{opacity:1}

.viewer .content{
  padding:12px;
}

.viewer video{
  width:100%;
  height:auto;
  max-height: calc(100svh - 220px);
  border-radius:18px;
  border:1px solid rgba(0,255,255,.16);
  background:#000;
  display:block;
}

/* small hint */
.hint{
  margin-top:10px;
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  opacity:.35;
}
</style>
</head>

<body>
<div class="safe">

  <div class="topbar">
    <div class="title">VISUAL MODULE</div>
    <a class="btn" href="/">HOME</a>
  </div>

  <div class="grid">
    <!-- Real video artifact -->
    <div class="card"
         data-title="ARTIFACT 01"
         data-src="/assets/videos/artifact01.mp4">
      <video muted loop playsinline preload="metadata"></video>
      <div class="overlay"></div>
      <div class="meta">
        <div class="name">ARTIFACT 01</div>
        <div class="desc">2:00 · MP4 · installation fragment</div>
      </div>
      <div class="badge">VIEW</div>
    </div>

    <!-- Placeholders (keep for now) -->
    <div class="card" data-title="ARTIFACT 02" data-src="">
      <div class="overlay"></div>
      <div class="meta">
        <div class="name">ARTIFACT 02</div>
        <div class="desc">placeholder</div>
      </div>
      <div class="badge">LOCK</div>
    </div>

    <div class="card" data-title="ARTIFACT 03" data-src="">
      <div class="overlay"></div>
      <div class="meta">
        <div class="name">ARTIFACT 03</div>
        <div class="desc">placeholder</div>
      </div>
      <div class="badge">LOCK</div>
    </div>

    <div class="card" data-title="ARTIFACT 04" data-src="">
      <div class="overlay"></div>
      <div class="meta">
        <div class="name">ARTIFACT 04</div>
        <div class="desc">placeholder</div>
      </div>
      <div class="badge">LOCK</div>
    </div>
  </div>

</div>

<!-- Fullscreen viewer -->
<div class="viewer" id="viewer" role="dialog" aria-modal="true">
  <div class="panel">
    <div class="bar">
      <div class="vtitle" id="vTitle">ARTIFACT</div>
      <div class="x" id="closeBtn">CLOSE (ESC)</div>
    </div>
    <div class="content">
      <video id="vPlayer" controls playsinline preload="metadata"></video>
      <div class="hint">Tip: hover cards to preview · click to open full player</div>
    </div>
  </div>
</div>

<script>
/* transitions + bfcache */
document.body.classList.add("is-entering");
requestAnimationFrame(()=>requestAnimationFrame(()=>document.body.classList.remove("is-entering")));
window.addEventListener("pageshow",()=>{
  document.documentElement.classList.remove("is-transitioning");
  document.body.classList.remove("is-entering");
});

/* smooth nav home */
document.querySelectorAll('a[href="/"]').forEach(a=>{
  a.addEventListener("click",(e)=>{
    e.preventDefault();
    document.documentElement.classList.add("is-transitioning");
    setTimeout(()=>location.href="/",500);
  });
});

/* bind previews + viewer */
const viewer = document.getElementById("viewer");
const vTitle = document.getElementById("vTitle");
const vPlayer = document.getElementById("vPlayer");
const closeBtn = document.getElementById("closeBtn");

function openViewer(title, src){
  if(!src) return;
  vTitle.textContent = title || "ARTIFACT";
  vPlayer.src = src;
  viewer.classList.add("open");
  // autoplay usually blocked with sound; user will click play
  vPlayer.currentTime = 0;
}

function closeViewer(){
  viewer.classList.remove("open");
  vPlayer.pause();
  vPlayer.removeAttribute("src");
  vPlayer.load();
}

closeBtn.addEventListener("click", closeViewer);
viewer.addEventListener("click",(e)=>{ if(e.target === viewer) closeViewer(); });
window.addEventListener("keydown",(e)=>{ if(e.key === "Escape") closeViewer(); });

document.querySelectorAll(".card").forEach(card=>{
  const src = card.dataset.src || "";
  const title = card.dataset.title || "ARTIFACT";

  // if has video, attach it for preview
  const vid = card.querySelector("video");
  if(vid && src){
    vid.src = src;
    // hover play preview (muted loop)
    card.addEventListener("mouseenter", ()=>{ try{ vid.play(); }catch{} });
    card.addEventListener("mouseleave", ()=>{ vid.pause(); });
  }

  card.addEventListener("click", ()=> openViewer(title, src));
});
</script>
</body>
</html>
