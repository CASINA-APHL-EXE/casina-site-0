<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VISUAL — CASINA</title>

<style>
:root{
  --c: rgba(0,255,255,.85);
  --bg:#000;

  --fs-1: clamp(12px,1.05vw,16px);
  --fs-2: clamp(16px,1.45vw,22px);
  --ls-1: clamp(1px,.25vw,4px);

  --pad: clamp(14px,2vw,24px);
  --radius:8px;
  --shadow: 0 0 40px rgba(0,255,255,.08);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:var(--bg);
  color:var(--c);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}

/* page transition */
html.is-transitioning body{ opacity:0; filter: blur(10px); transform: translateY(6px); transition: .5s ease; }
body.is-entering{ opacity:0; filter: blur(10px); transform: translateY(6px); }
body{ transition: .5s ease; }

/* top bar */
.shell{
  padding:
    calc(var(--pad) + env(safe-area-inset-top))
    calc(var(--pad) + env(safe-area-inset-right))
    calc(var(--pad) + env(safe-area-inset-bottom))
    calc(var(--pad) + env(safe-area-inset-left));
}

.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom: clamp(14px,2vw,18px);
}

.h1{
  font-size:var(--fs-2);
  letter-spacing:var(--ls-1);
  opacity:.95;
}

.home{
  text-decoration:none;
  color:var(--c);
  border:1px solid rgba(0,255,255,.25);
  background:rgba(0,255,255,.05);
  padding: 10px 14px;
  border-radius: 18px;
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  opacity:.9;
}
.home:hover{opacity:1}

/* GRID */
.grid{
  display:grid;
  gap: clamp(14px,2vw,18px);
  grid-template-columns: repeat(4, minmax(0,1fr));
}
@media (max-width:1100px){ .grid{ grid-template-columns: repeat(3, minmax(0,1fr)); } }
@media (max-width:820px){ .grid{ grid-template-columns: repeat(2, minmax(0,1fr)); } }
@media (max-width:720px){
  .grid{
    grid-template-columns: 1fr;
    gap: 18px;
  }
}

/* Card */
.card{
  border:1px solid rgba(0,255,255,.18);
  border-radius: 16px;
  overflow:hidden;
  background: rgba(0,255,255,.03);
  box-shadow: var(--shadow);
  display:flex;
  flex-direction:column;
  cursor:pointer;
}

/* 9:16 video preview */
.videoBox{
  aspect-ratio: 9/16;
  background:#000;
  position:relative;
}
.videoBox video{
  width:100%;
  height:100%;
  object-fit: cover;
  display:block;
  background:#000;
}

/* Footer under video */
.footer{
  padding: 14px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap: 12px;
}
.meta{ min-width:0; }
.name{
  font-size: var(--fs-1);
  letter-spacing: var(--ls-1);
  opacity:.92;
  margin:0 0 8px 0;
}
.desc{
  margin:0;
  font-size: var(--fs-1);
  opacity:.65;
  line-height:1.4;
  letter-spacing: 1px;
}

/* FULLSCREEN PLAYER (kept out of layout, but NOT transparent in fullscreen) */
#fsVideo{
  position:fixed;
  left:-9999px;
  top:-9999px;
  width: 320px;   /* give it a real size to avoid some desktop fullscreen bugs */
  height: 180px;
  background:#000;
  outline:none;
}

/* Make sure it is visible when in fullscreen (fix: black screen w/ audio on desktop) */
#fsVideo:fullscreen{
  left:0;
  top:0;
  width:100vw;
  height:100vh;
  background:#000;
}
#fsVideo:-webkit-full-screen{
  left:0;
  top:0;
  width:100vw;
  height:100vh;
  background:#000;
}

@media (max-width:720px){
  /* short-video feed feel */
  .card{ scroll-snap-align: start; }
  .grid{
    scroll-snap-type: y mandatory;
    overflow-y:auto;
    max-height: calc(100svh - 120px);
    padding-bottom: 10px;
  }
}
</style>
</head>

<body>
<div class="shell">
  <div class="top">
    <div class="h1">VISUAL MODULE</div>
    <a class="home" href="/">HOME</a>
  </div>

  <section class="grid" id="grid">
    <!-- SAMPLE CARD -->
    <article class="card" data-src="../assets/videos/artifact01.mp4" data-title="ARTIFACT 01">
      <div class="videoBox">
        <video muted playsinline loop preload="metadata"></video>
      </div>
      <div class="footer">
        <div class="meta">
          <p class="name">ARTIFACT 01</p>
          <p class="desc">720×1280 · AE fragment</p>
        </div>
      </div>
    </article>

    <!-- duplicate <article class="card"...> for more artifacts -->
  </section>
</div>

<!-- Fullscreen launcher -->
<video id="fsVideo" controls preload="metadata"></video>

<script>
document.body.classList.add("is-entering");
requestAnimationFrame(()=>requestAnimationFrame(()=>document.body.classList.remove("is-entering")));
window.addEventListener("pageshow",()=>{
  document.documentElement.classList.remove("is-transitioning");
  document.body.classList.remove("is-entering");
});
document.querySelectorAll('a[href="/"]').forEach(a=>{
  a.addEventListener("click",(e)=>{
    e.preventDefault();
    document.documentElement.classList.add("is-transitioning");
    setTimeout(()=>location.href="/",500);
  });
});

const cards = [...document.querySelectorAll(".card")];
const fsVideo = document.getElementById("fsVideo");

function isMobile(){ return window.innerWidth < 720; }

function pausePreviews(except=null){
  cards.forEach(c=>{
    if(except && c===except) return;
    const v = c.querySelector(".videoBox video");
    if(v) v.pause();
  });
}

function cleanupFsVideo(){
  fsVideo.pause();
  fsVideo.removeAttribute("src");
  fsVideo.load();
}

// Exit handlers
document.addEventListener("fullscreenchange", ()=>{
  if(!document.fullscreenElement) cleanupFsVideo();
});
fsVideo.addEventListener("webkitendfullscreen", cleanupFsVideo);

async function openFullscreen(card){
  const src = card.dataset.src || "";
  if(!src) return;

  // stop any preview FIRST (prevents intermediate flash / double players)
  pausePreviews();

  // force controls always on
  fsVideo.controls = true;
  fsVideo.setAttribute("controls","");

  fsVideo.pause();
  fsVideo.src = src;
  fsVideo.currentTime = 0;
  fsVideo.muted = false;
  fsVideo.playsInline = false;

  // Desktop / Android: request fullscreen first, then play (more reliable for controls + video paint)
  if (fsVideo.requestFullscreen){
    try{ await fsVideo.requestFullscreen(); }catch(e){}
    try{ await fsVideo.play(); }catch(e){}
    return;
  }

  // iOS Safari: play, then enter fullscreen
  try{
    await fsVideo.play();
    if (fsVideo.webkitEnterFullscreen){
      try{ fsVideo.webkitEnterFullscreen(); }catch(e){}
    }
  }catch(e){}
}

cards.forEach(card=>{
  const src = card.dataset.src || "";
  const v = card.querySelector(".videoBox video");
  if(src && v){
    v.src = src;
    v.muted = true;
    v.loop = true;
    v.playsInline = true;
  }

  // desktop hover preview only
  card.addEventListener("mouseenter",()=>{
    if(!window.matchMedia("(hover:hover)").matches) return;
    if(!v) return;
    v.muted = true;
    v.play().catch(()=>{});
  });
  card.addEventListener("mouseleave",()=>{
    if(!window.matchMedia("(hover:hover)").matches) return;
    if(!v) return;
    v.pause();
  });

  // click anywhere opens fullscreen
  card.addEventListener("click",()=>openFullscreen(card));
});

// mobile scroll: autoplay muted preview on most visible card
const observer = new IntersectionObserver(entries=>{
  if(!isMobile()) return;

  const visible = entries
    .filter(e=>e.isIntersecting)
    .sort((a,b)=> b.intersectionRatio - a.intersectionRatio);

  if(visible.length === 0) return;

  const card = visible[0].target;
  const v = card.querySelector(".videoBox video");
  if(!v) return;

  pausePreviews(card);
  v.muted = true;
  v.play().catch(()=>{});
}, { threshold:[0.6,0.8,0.9] });

cards.forEach(c=>observer.observe(c));
</script>
</body>
</html>
