<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VISUAL — CASINA</title>

<style>
:root{
  --c: rgba(0,255,255,.85);
  --bg:#000;

  --fs-1: clamp(12px,1.05vw,16px);
  --fs-2: clamp(16px,1.45vw,22px);
  --ls-1: clamp(1px,.25vw,4px);

  --pad: clamp(14px,2vw,24px);
  --radius:8px;
  --stroke:rgba(0,255,255,.20);
  --panel:rgba(0,255,255,.05);
}

*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--c);font-family:monospace}
body{
  min-height:100svh;
  opacity:1;
  transition:opacity .6s ease,filter .6s ease;
  overflow-x:hidden;
}
body.is-entering{opacity:0;filter:blur(2px)}
html.is-transitioning body{opacity:0;filter:blur(2px)}

.safe{
  padding:
    calc(var(--pad) + env(safe-area-inset-top))
    calc(var(--pad) + env(safe-area-inset-right))
    calc(var(--pad) + env(safe-area-inset-bottom))
    calc(var(--pad) + env(safe-area-inset-left));
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
  gap:10px;
}
.title{
  font-size:var(--fs-2);
  letter-spacing:var(--ls-1);
  opacity:.85;
}
.btn{
  text-decoration:none;
  color:var(--c);
  border:1px solid rgba(0,255,255,.25);
  background:rgba(0,255,255,.04);
  padding:10px 14px;
  border-radius:14px;
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  opacity:.8;
  white-space:nowrap;
}
.btn:hover{opacity:1}

.grid{
  margin-top:30px;
  display:grid;
  gap:18px;
  grid-template-columns:repeat(4,1fr);
}
@media (max-width:1200px){ .grid{grid-template-columns:repeat(3,1fr)} }
@media (max-width:900px){ .grid{grid-template-columns:repeat(2,1fr)} }

@media (max-width:720px){
  .grid{
    grid-template-columns:1fr;
    max-height:calc(100svh - 90px);
    overflow-y:auto;
    scroll-snap-type:y mandatory;
  }
  .card{
    scroll-snap-align:start;
    min-height:calc(100svh - 110px);
    aspect-ratio:auto;
  }
}

.card{
  position:relative;
  overflow:hidden;
  cursor:pointer;
  background:var(--panel);
  border:1px solid var(--stroke);
  aspect-ratio:9/16;
  border-radius:var(--radius);
  clip-path:polygon(0 0,100% 0,100% 95%,95% 100%,0 100%);
  transition:.2s;
  opacity:.9;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 0 26px rgba(0,255,255,.1);
  opacity:1;
}

.card video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  opacity:.9;
  transform:scale(1.02);
  transition:.2s;
}
.card:hover video{
  opacity:1;
  transform:scale(1.05);
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.72), rgba(0,0,0,.06) 55%, rgba(0,0,0,0));
  pointer-events:none;
}

.meta{
  position:absolute;
  left:12px;
  bottom:12px;
  right:12px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:10px;
  pointer-events:none;
}

.txt{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.name{
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
}
.desc{
  font-size:var(--fs-1);
  opacity:.5;
}

.badge{
  pointer-events:auto;
  border:1px solid rgba(0,255,255,.22);
  background:rgba(0,0,0,.35);
  padding:6px 10px;
  border-radius:999px;
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  cursor:pointer;
  user-select:none;
  opacity:.9;
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:42px;
}
.badge:hover{opacity:1}

/* Viewer (custom fullscreen) */
.viewer{
  position:fixed;
  inset:0;
  z-index:99;
  display:none;
  background:rgba(0,0,0,.92);
}
.viewer.open{display:block;}

.viewerTop{
  position:absolute;
  left:0; right:0; top:0;
  padding:
    calc(var(--pad) + env(safe-area-inset-top))
    calc(var(--pad) + env(safe-area-inset-right))
    10px
    calc(var(--pad) + env(safe-area-inset-left));
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.viewerTitle{
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  opacity:.7;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.viewerClose{
  border:1px solid rgba(0,255,255,.22);
  background:rgba(0,255,255,.06);
  color:var(--c);
  padding:8px 12px;
  border-radius:14px;
  font-size:var(--fs-1);
  letter-spacing:var(--ls-1);
  cursor:pointer;
  opacity:.9;
  user-select:none;
}
.viewerClose:hover{opacity:1}

.viewerStage{
  position:absolute;
  left:0; right:0;
  top:70px;
  bottom:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 20px;
}

@media (max-width:720px){
  .viewerStage{ top:80px; padding: 14px; }
}

.viewerVideo{
  width: min(460px, 92vw);
  height: auto;
  max-height: calc(100svh - 140px);
  object-fit: contain;
  background:#000;
  border-radius: 14px;
  border:1px solid rgba(0,255,255,.18);
  box-shadow: 0 0 60px rgba(0,255,255,.10);
  display:block;
}
</style>
</head>

<body>
<div class="safe">
  <div class="topbar">
    <div class="title">VISUAL MODULE</div>
    <a class="btn" href="/">HOME</a>
  </div>

  <section class="grid" id="grid">
    <div class="card" data-title="ARTIFACT 01" data-src="/assets/videos/artifact01.mp4">
      <video muted loop playsinline preload="metadata"></video>
      <div class="overlay"></div>

      <div class="meta">
        <div class="txt">
          <div class="name">ARTIFACT 01</div>
          <div class="desc">720×1280 · AE fragment</div>
        </div>
        <div class="badge" data-open aria-label="Open viewer">⤢</div>
        <!-- if you prefer text, replace ⤢ with VIDEO -->
      </div>
    </div>

    <!-- duplicate card blocks for more artifacts -->
  </section>
</div>

<div class="viewer" id="viewer" aria-modal="true" role="dialog">
  <div class="viewerTop">
    <div class="viewerTitle" id="viewerTitle">ARTIFACT</div>
    <div class="viewerClose" id="viewerClose">×</div>
  </div>
  <div class="viewerStage" id="viewerStage">
    <video class="viewerVideo" id="viewerVideo" controls playsinline preload="metadata"></video>
  </div>
</div>

<script>
document.body.classList.add("is-entering");
requestAnimationFrame(()=>requestAnimationFrame(()=>document.body.classList.remove("is-entering")));

window.addEventListener("pageshow",()=>{
  document.documentElement.classList.remove("is-transitioning");
  document.body.classList.remove("is-entering");
});

document.querySelectorAll('a[href="/"]').forEach(a=>{
  a.addEventListener("click",(e)=>{
    e.preventDefault();
    document.documentElement.classList.add("is-transitioning");
    setTimeout(()=>location.href="/",500);
  });
});

const cards = [...document.querySelectorAll(".card")];
const viewer = document.getElementById("viewer");
const viewerTitle = document.getElementById("viewerTitle");
const viewerVideo = document.getElementById("viewerVideo");
const viewerClose = document.getElementById("viewerClose");
const viewerStage = document.getElementById("viewerStage");

function isMobile(){ return window.innerWidth < 720; }

function pauseAll(except=null){
  cards.forEach(c=>{
    if(except && c===except) return;
    const v = c.querySelector("video");
    if(v){ v.pause(); }
    c.dataset.playing="0";
  });
}

function openViewer(card){
  const src = card.dataset.src || "";
  if(!src) return;

  const title = card.dataset.title || "ARTIFACT";
  viewerTitle.textContent = title;

  viewerVideo.src = src;
  viewerVideo.muted = false;
  viewer.classList.add("open");

  pauseAll(card);

  viewerVideo.currentTime = 0;
  viewerVideo.play().catch(()=>{});
}

function closeViewer(){
  viewer.classList.remove("open");
  viewerVideo.pause();
  viewerVideo.removeAttribute("src");
  viewerVideo.load();
}

viewerClose.addEventListener("click", closeViewer);
viewer.addEventListener("click",(e)=>{
  if(e.target === viewer) closeViewer();
});
window.addEventListener("keydown",(e)=>{
  if(e.key === "Escape" && viewer.classList.contains("open")) closeViewer();
});

cards.forEach(card=>{
  const src = card.dataset.src || "";
  const v = card.querySelector("video");
  if(src && v){
    v.src = src;
    v.loop = true;
    v.playsInline = true;
    v.muted = true;
  }

  card.addEventListener("mouseenter",()=>{
    if(!window.matchMedia("(hover:hover)").matches) return;
    if(card.dataset.playing==="1") return;
    if(!v) return;
    v.muted = true;
    v.play().catch(()=>{});
  });

  card.addEventListener("mouseleave",()=>{
    if(!window.matchMedia("(hover:hover)").matches) return;
    if(card.dataset.playing==="1") return;
    if(!v) return;
    v.pause();
  });

  card.addEventListener("click",(e)=>{
    if(e.target && e.target.closest && e.target.closest("[data-open]")) return;

    if(isMobile()){
      openViewer(card);
      return;
    }

    if(!v || !src) return;

    if(card.dataset.playing==="1"){
      v.pause();
      card.dataset.playing="0";
    }else{
      pauseAll(card);
      v.muted = false;
      v.controls = false;
      v.play().catch(()=>{});
      card.dataset.playing="1";
    }
  });

  const openBtn = card.querySelector("[data-open]");
  if(openBtn){
    openBtn.addEventListener("click",(e)=>{
      e.stopPropagation();
      openViewer(card);
    });
  }
});

const observer = new IntersectionObserver(entries=>{
  if(!isMobile()) return;

  const visible = entries
    .filter(e=>e.isIntersecting)
    .sort((a,b)=> b.intersectionRatio - a.intersectionRatio);

  if(visible.length === 0) return;

  const card = visible[0].target;
  if(card.dataset.playing==="1") return;

  const v = card.querySelector("video");
  if(!v) return;

  pauseAll(card);
  v.muted = true;
  v.play().catch(()=>{});
}, { threshold:[0.6,0.8,0.9] });

cards.forEach(c=>observer.observe(c));
</script>
</body>
</html>
